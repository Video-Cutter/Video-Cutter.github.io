name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Jalankan otomatis setiap kali Anda melakukan push ke branch main

permissions:
  contents: write # Diperlukan izin untuk menulis draf rilis ke gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Folder hasil build buatan Vite
          branch: gh-pages # Target branch tempat menyimpan file statis siap uji
